<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="main">
        <header id="forgot-password-header">
            <h2 id="forgot-password-title">Recuperar Senha</h2>
            <p id="forgot-password-desc">
                Digite seu e-mail cadastrado para receber as instruções de recuperação.
            </p>
        </header>

        <form id="forgotForm">
            <fieldset class="grupo">
                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
            </fieldset>

            <div class="menu" style="margin-top: 20px;">
                <button type="submit" id="enter">Redefinir Senha</button>
                <button type="button" id="cancel" onclick="window.location.href='/index.html'">Voltar</button>
            </div>
        </form>
    </div>

    <script src="forgot-password.js"></script>
</body>
</html>
