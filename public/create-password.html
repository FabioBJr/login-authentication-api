<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Senha</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="main">
        <header id="reset-password-header">
            <h2 id="reset-password-title">Criar Senha</h2>
            <p id="reset-password-desc">
                Crie uma senha para sua nova conta.
            </p>
        </header>

        <form id="resetForm">
            <fieldset class="grupo">
                <div class="campo">
                    <label for="password">Nova Senha</label>
                    <input type="password" id="password" name="password" placeholder="Sua nova senha" required>
                </div>
                <div class="campo">
                    <label for="confirmPassword">Confirmar Senha</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme sua senha" required>
                </div>
            </fieldset>

            <div class="menu" style="margin-top: 20px;">
                <button type="submit" id="enter">Salvar Senha</button>
                <button type="button" id="cancel" onclick="window.location.href='/index.html'">Voltar</button>
            </div>
        </form>
    </div>

    <script src="create-password.js"></script>
</body>
</html>
